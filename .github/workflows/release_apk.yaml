name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    env:
      APK_PATH: app/build/outputs/apk/release/app-release.apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.KEY_ALIAS }}"
          test -n "${{ secrets.KEY_PASSWORD }}"

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Read app version
        id: app_version
        run: |
          VERSION_NAME="$(grep '^VERSION_NAME=' version.properties | cut -d'=' -f2)"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Ensure tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          EXPECTED_TAG="v${{ steps.app_version.outputs.version_name }}"
          if [ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION_NAME ${EXPECTED_TAG}" >&2
            exit 1
          fi

      - name: Prepare release assets
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-v${{ steps.app_version.outputs.version_name }}}"
          APK_NAME="ZombiDeck-${TAG_NAME}.apk"
          cp "$APK_PATH" "$APK_NAME"
          sha256sum "$APK_NAME" > "${APK_NAME}.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: |
            ZombiDeck-*.apk
            ZombiDeck-*.apk.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ZombiDeck-*.apk
            ZombiDeck-*.apk.sha256
          generate_release_notes: true

